version: '3.8'

services:
  bot:
    build: .
    container_name: etherial-fantasy-bot
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - FIREBASE_DATABASE_URL=${FIREBASE_DATABASE_URL}
      - FIREBASE_SERVICE_ACCOUNT_PATH=/app/firebase-credentials.json
    volumes:
      - ${FIREBASE_CREDENTIALS_PATH}:/app/firebase-credentials.json:ro
    networks:
      - etherial-network

networks:
  etherial-network:
    driver: bridge
